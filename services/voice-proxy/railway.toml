# Voice Proxy — Railway Service Configuration
# Deploy as a NEW Railway project (never modify voice.tradecraft.nexus).

[build]
builder = "RAILPACK"
buildCommand = "npm install && npm run build"
watchPatterns = ["services/voice-proxy/**"]

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 300
